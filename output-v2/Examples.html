<h3 class="section" id="Examples-1"><span>E.13 示例<a class="copiable-link" href="#Examples-1"> ¶</a></span></h3>

<p>目标重新启动的示例序列。注意重新启动时如何没有任何直接输出：
</p>
<div class="example smallexample">
<pre class="example-preformatted">-&gt; <code class="code">R00</code>
&lt;- <code class="code">+</code>
<em class="emph">目标重新启动</em>
-&gt; <code class="code">?</code>
&lt;- <code class="code">+</code>
&lt;- <code class="code">T001:1234123412341234</code>
-&gt; <code class="code">+</code>
</pre></div>

<p>目标单步执行一条指令的示例序列：
</p>
<div class="example smallexample">
<pre class="example-preformatted">-&gt; <code class="code">G1445...</code>
&lt;- <code class="code">+</code>
-&gt; <code class="code">s</code>
&lt;- <code class="code">+</code>
<em class="emph">时间流逝</em>
&lt;- <code class="code">T001:1234123412341234</code>
-&gt; <code class="code">+</code>
-&gt; <code class="code">g</code>
&lt;- <code class="code">+</code>
&lt;- <code class="code">1455...</code>
-&gt; <code class="code">+</code>
</pre></div>

</div>
