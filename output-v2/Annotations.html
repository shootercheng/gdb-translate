<h2 class="chapter" id="gdb-Annotations"><span>28 <small class="sc">GDB</small> 注释<a class="copiable-link" href="#gdb-Annotations"> ¶</a></span></h2>

<p>本章描述了中的注释。注释旨在与希望在相对较高层次上进行交互的图形用户界面或其他类似程序进行接口 <small class="sc">GDB</small>到 <small class="sc">GDB</small> 到 <small class="sc">GDB</small> 。
</p>
<p>注释机制在很大程度上已被 <small class="sc">GDB/MI</small>
取代（见 <a class="pxref" href="GDB_002fMI.html">The <small class="sc">GDB/MI</small> 接口</a>）。
</p>
