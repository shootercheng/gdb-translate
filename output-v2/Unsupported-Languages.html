<h3 class="section" id="Unsupported-Languages-1"><span>15.5 不支持的语言<a class="copiable-link" href="#Unsupported-Languages-1"> ¶</a></span></h3>

<a class="index-entry-id" id="index-unsupported-languages"></a>
<a class="index-entry-id" id="index-minimal-language"></a>
<p>除了其他完全支持的编程语言之外，
<small class="sc">GDB</small> 还提供了一种伪语言，称为 <code class="code">minimal</code>.
它并不代表一种真正的编程语言，但提供了一组接近 C 语言或汇编语言所提供的功能。
这应该允许在调试使用当前不被 <small class="sc">GDB</small>支持的语言编写的应用程序时执行大多数简单操作。
</p>
<p>如果语言设置为 <code class="code">auto</code>, <small class="sc">GDB</small> 如果当前帧对应于一种不支持的语言，将自动选择此语言。
</p>
