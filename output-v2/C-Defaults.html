<h4 class="subsubsection" id="C-and-C_002b_002b-Defaults"><span>15.4.1.4 C 和 C++<code class="t">++</code> 默认设置<a class="copiable-link" href="#C-and-C_002b_002b-Defaults"> ¶</a></span></h4>

<a class="index-entry-id" id="index-C-and-C_002b_002b-defaults"></a>

<p>如果您允许 <small class="sc">GDB</small> 自动设置范围检查，它会在工作语言变为
C 或 C++ 时默认设置为 <code class="code">off</code> 。无论您还是<code class="t">++</code>选择了工作语言，都会发生这种情况。 <small class="sc">GDB</small>

</p>
<p>如果您允许 <small class="sc">GDB</small> 自动设置语言，它会识别文件名以 <samp class="file">.c</samp>, <samp class="file">.C</samp>, 或
<samp class="file">.cc</samp>, 等结尾的源文件，当 <small class="sc">GDB</small> 进入从这些文件之一编译的代码时，它会将工作语言设置为 C 或 C++<code class="t">++</code>。
请参阅 <a class="xref" href="Automatically.html">具有 <small class="sc">GDB</small> 推断源语言</a>，
以获取更多详细信息。
</p>
