<h2 class="appendix" id="Operating-System-Information-1"><span>附录 H 操作系统信息<a class="copiable-link" href="#Operating-System-Information-1"> ¶</a></span></h2>
<a class="index-entry-id" id="index-operating-system-information"></a>

<p>……的用户 <small class="sc">GDB</small> 通常希望获取有关目标上运行的操作系统状态的信息，例如进程列表或打开文件的列表。本节介绍了实现这一目的的机制。该机制与目标特性机制类似（见 <a class="pxref" href="Target-Descriptions.html">目标描述</a>），但侧重于目标的不同方面。
</p>
<p>操作系统信息是通过远程协议，使用‘<samp class="samp">qXfer</samp>’请求从目标获取的（见 <a class="pxref" href="General-Query-Packets.html#qXfer-osdata-read">qXfer osdata read</a>)。请求中的对象名称应该是‘<samp class="samp">osdata</samp>’，并且 <var class="var">附件</var> 标识要获取的数据。
</p>
