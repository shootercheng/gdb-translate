<h3 class="section" id="Bindable-Readline-Commands-1"><span>33.4 可绑定的Readline命令<a class="copiable-link" href="#Bindable-Readline-Commands-1"> ¶</a></span></h3>


<p>本节介绍可绑定到按键序列的Readline命令。
默认情况下，没有伴随按键序列的命令名称是未绑定的。
</p>
<p>在以下描述中， <em class="dfn">光标位置</em> 指当前光标
位置，并且 <em class="dfn">标记</em> 指由
<code class="code">set-mark</code> 命令保存的光标位置。
光标位置和标记之间的文本称为 <em class="dfn">区域</em>。
</p>
