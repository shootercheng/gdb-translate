<h4 class="subsection" id="gdb_002fmi-Ada-Exception-Information"><span>27.5.7 <small class="sc">GDB/MI</small> Ada异常信息<a class="copiable-link" href="#gdb_002fmi-Ada-Exception-Information"> ¶</a></span></h4>

<p>无论何时，当 <code class="code">*stopped</code> 记录被发出，是因为程序在命中异常捕获点后停止（参见 <a class="pxref" href="Set-Catchpoints.html">设置捕获点</a>）
<small class="sc">GDB</small> 通过
字段提供所引发异常的名称。此外，对于带有异常消息引发的异常， <code class="code">exception-name</code> 字段。 而且，对于带有异常消息引发的异常， <small class="sc">GDB</small> 通过
字段提供该消息。 <code class="code">exception-message</code> 字段。
</p>
