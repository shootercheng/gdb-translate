<h2 class="chapter" id="Configuration_002dSpecific-Information"><span>21 特定配置信息<a class="copiable-link" href="#Configuration_002dSpecific-Information"> ¶</a></span></h2>

<p>虽然几乎所有 <small class="sc">GDB</small> 命令都适用于调试器的所有原生和交叉版本，但也有一些例外情况。本章描述了仅在某些配置中可用的内容。
</p>
<p>配置主要分为三大类：原生配置（主机和目标机相同）、嵌入式操作系统配置（通常适用于几种不同的处理器架构）以及裸嵌入式处理器（彼此差异很大）。
</p>
