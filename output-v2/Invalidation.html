<h3 class="section" id="Invalidation-Notices"><span>28.5 失效通知<a class="copiable-link" href="#Invalidation-Notices"> ¶</a></span></h3>

<a class="index-entry-id" id="index-annotations-for-invalidation-messages"></a>
<p>以下注释表明某些状态片段可能已经改变。
</p>
<dl class="table">
<dt><a id="index-frames_002dinvalid-annotation"></a><span><code class="code">^Z^Zframes-invalid</code><a class="copiable-link" href="#index-frames_002dinvalid-annotation"> ¶</a></span></dt>
<dd>
<p>帧（例如，来自……的输出 <code class="code">backtrace</code> 命令）可能已经改变。
</p>
</dd>
<dt><a id="index-breakpoints_002dinvalid-annotation"></a><span><code class="code">^Z^Zbreakpoints-invalid</code><a class="copiable-link" href="#index-breakpoints_002dinvalid-annotation"> ¶</a></span></dt>
<dd>
<p>断点可能已经改变。例如，用户刚刚添加或删除了一个断点。
</p></dd>
</dl>
