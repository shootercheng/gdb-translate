<h2 class="chapter" id="gdb-Files"><span>18 <small class="sc">GDB</small> 文件<a class="copiable-link" href="#gdb-Files"> ¶</a></span></h2>

<p><small class="sc">GDB</small> 需要知道要调试的程序的文件名，
这既是为了读取其符号表，也是为了启动你的
程序。 要调试之前运行的核心转储文件，你还必须指定
<small class="sc">GDB</small> 核心转储文件的名称。
