<h4 class="subsubsection" id="gdb-and-C"><span>15.4.1.6 <small class="sc">GDB</small> 和 C 语言<a class="copiable-link" href="#gdb-and-C"> ¶</a></span></h4>

<p>这些 <code class="code">set print union</code> 和 <code class="code">show print union</code> 命令适用于
该 <code class="code">union</code> 类型。当设置为 ‘<samp class="samp">开启</samp>’ 时，任何
位于 <code class="code">union</code> 内部的 <code class="code">struct</code> 或 <code class="code">class</code> 也会被打印出来。否则，它
会显示为 ‘<samp class="samp">{...}</samp>’。
</p>
<p>这个 <code class="code">@</code> 运算符有助于调试由指针和内存分配函数构成的动态数组。请参阅 <a class="xref" href="Expressions.html">表达式</a>.
</p>
