<h4 class="subsection" id="TMS320C6x-Features"><span>G.5.17 TMS320C6x 特性<a class="copiable-link" href="#TMS320C6x-Features"> ¶</a></span></h4>
<a class="index-entry-id" id="index-target-descriptions_002c-TIC6x-features"></a>
<a class="index-entry-id" id="index-target-descriptions_002c-TMS320C6x-features"></a>
<p>‘<samp class="samp">org.gnu.gdb.tic6x.core</samp>’ 特性是 TMS320C6x 目标所需的。它应包含寄存器 ‘<samp class="samp">A0</samp>’ 到 ‘<samp class="samp">A15</samp>’，
寄存器 ‘<samp class="samp">B0</samp>’ 到 ‘<samp class="samp">B15</samp>’、‘<samp class="samp">CSR</samp>’ 和 ‘<samp class="samp">PC</samp>’。
</p>
<p>‘<samp class="samp">org.gnu.gdb.tic6x.gp</samp>’ 特性是可选的。它应
包含寄存器 ‘<samp class="samp">A16</samp>’ 到 ‘<samp class="samp">A31</samp>’ 和 ‘<samp class="samp">B16</samp>’
到 ‘<samp class="samp">B31</samp>’。
</p>
<p>‘<samp class="samp">org.gnu.gdb.tic6x.c6xp</samp>’ 特性是可选的。它应
包含寄存器 ‘<samp class="samp">TSR</samp>’、‘<samp class="samp">ILC</samp>’ 和 ‘<samp class="samp">RILC</samp>’。
</p>
