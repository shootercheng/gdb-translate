<h3 class="section" id="Stopping-and-Starting-Multi_002dthread-Programs"><span>5.5 停止和启动多线程程序<a class="copiable-link" href="#Stopping-and-Starting-Multi_002dthread-Programs"> ¶</a></span></h3>

<a class="index-entry-id" id="index-stopped-threads"></a>
<a class="index-entry-id" id="index-threads_002c-stopped"></a>

<a class="index-entry-id" id="index-continuing-threads"></a>
<a class="index-entry-id" id="index-threads_002c-continuing"></a>

<p><small class="sc">GDB</small> 支持调试多线程程序（请参阅 <a class="pxref" href="Threads.html">调试多线程程序</a>）。在调试器中控制程序执行有两种模式。在默认模式下，即 <em class="dfn">全停止模式</em>，当程序中的任何线程停止（例如，在断点处或单步执行时），程序中的所有其他线程也会被 
<small class="sc">GDB</small>停止。在某些目标系统上， <small class="sc">GDB</small> 还支持 
<em class="dfn">非停止模式</em>，在这种模式下，当你在调试器中检查停止的线程时，其他线程可以继续自由运行。
</p>
