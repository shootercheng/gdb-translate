<h3 class="section" id="In_002dProcess-Agent-Protocol-1"><span>31.1 进程内代理协议<a class="copiable-link" href="#In_002dProcess-Agent-Protocol-1"> ¶</a></span></h3>
<a class="index-entry-id" id="index-in_002dprocess-agent-protocol"></a>

<p>进程内代理能够与两者进行通信 <small class="sc">GDB</small> 以及
GDB 服务器（请参阅 <a class="pxref" href="In_002dProcess-Agent.html">进程内代理</a>）。本节记录了用于
之间通信的协议 <small class="sc">GDB</small> 或 GDB 服务器与 IPA 之间的通信。
一般来说， <small class="sc">GDB</small> 或 GDB 服务器向进程内代理发送命令
（请参阅 <a class="pxref" href="IPA-Protocol-Commands.html">IPA 协议命令</a>）和数据，然后
进程内代理用命令的返回结果或
其他一些信息进行回复。发送给进程内代理的数据由基本数据类型（如 4 字节或 8 字节类型）和复合
类型组成，这些复合类型称为对象（请参阅 <a class="pxref" href="IPA-Protocol-Objects.html">IPA 协议对象</a>）。
</p>
