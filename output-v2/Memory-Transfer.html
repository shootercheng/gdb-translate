<h4 class="unnumberedsubsubsec" id="Memory-Transfer-1"><span>内存传输<a class="copiable-link" href="#Memory-Transfer-1"> ¶</a></span></h4>
<a class="index-entry-id" id="index-memory-transfer_002c-in-file_002di_002fo-protocol"></a>

<p>使用内存读写操作传输的结构化数据（例如，一个 <code class="code">struct stat</code>) 应采用特定于协议的格式，所有标量多字节数据类型应为大端字节序。目标端在发送 <code class="code">F</code> 
数据包之前，以及 <small class="sc">GDB</small> 在将内存传输到目标端之前，都需要进行到这种表示形式的转换。传输的指向结构化数据的指针应始终指向已经转换好的数据。
</p>
