<h4 class="subsection" id="g_t_0060_0060Cannot-insert-breakpoints_0027_0027"><span>5.1.11 “无法插入断点”<a class="copiable-link" href="#g_t_0060_0060Cannot-insert-breakpoints_0027_0027"> ¶</a></span></h4>

<p>如果您请求的活动硬件辅助断点和观察点过多，您将看到此错误消息：
</p>
<div class="example smallexample">
<pre class="example-preformatted">程序已停止；无法插入断点。
您可能请求了过多的硬件断点和观察点。
</pre></div>

<p>当您尝试恢复程序时会打印此消息，因为只有在那时 <small class="sc">GDB</small> 才确切知道需要插入多少个硬件断点和观察点。
</p>
<p>当打印此消息时，您需要禁用或移除一些硬件辅助断点和观察点，然后继续。
</p>
</div>
