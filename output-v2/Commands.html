<h2 class="chapter" id="gdb-Commands"><span>3 <small class="sc">GDB</small> 命令<a class="copiable-link" href="#gdb-Commands"> ¶</a></span></h2>

<p>如果缩写明确，您可以将命令缩写为命令名称的前几个字母；并且您可以通过仅输入 <small class="sc">GDB</small> RET
<small class="sc">GDB</small> 来重复某些 <kbd class="key">RET</kbd>命令。您还可以使用 <kbd class="key">TAB</kbd>
键下运行程序以 <small class="sc">GDB</small> 填充命令中单词的其余部分（或者如果有多种可能性，向您显示可用的替代项）。
</p>
