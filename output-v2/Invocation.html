<h2 class="chapter" id="Getting-In-and-Out-of-gdb"><span>2 进入和退出 <small class="sc">GDB</small><a class="copiable-link" href="#Getting-In-and-Out-of-gdb"> ¶</a></span></h2>

<p>本章讨论如何启动 <small class="sc">GDB</small>, 以及如何退出它。
要点如下：
</p><ul class="itemize mark-bullet">
<li>输入 ‘<samp class="samp">gdb</samp>’ 来启动 <small class="sc">GDB</small>.
</li><li>输入 <kbd class="kbd">quit</kbd>, <kbd class="kbd">exit</kbd> 或者 <kbd class="kbd">Ctrl-d</kbd> 来退出。
</li></ul>
