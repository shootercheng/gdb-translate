<h4 class="unnumberedsubsubsec" id="gettimeofday-1"><span>gettimeofday<a class="copiable-link" href="#gettimeofday-1"> ¶</a></span></h4>
<a class="index-entry-id" id="index-gettimeofday_002c-file_002di_002fo-system-call"></a>

<dl class="table">
<dt>概要：</dt>
<dd><div class="example smallexample">
<pre class="example-preformatted">int gettimeofday(struct timeval *tv, void *tz);
</pre></div>

</dd>
<dt>请求：</dt>
<dd><p>‘<samp class="samp">Fgettimeofday,<var class="var">时间值指针</var>,<var class="var">时区指针</var></samp>’
</p>
</dd>
<dt>返回值：</dt>
<dd><p>成功时返回0，否则返回 -1。
</p>
</dd>
<dt>错误：</dt>
<dd>
<dl class="table">
<dt><code class="code">EINVAL</code></dt>
<dd><p><var class="var">tz</var> 是一个非空指针。
</p>
</dd>
<dt><code class="code">EFAULT</code></dt>
<dd><p><var class="var">时间值指针</var> 和/或 <var class="var">时区指针</var> 是一个无效的指针值。
</p></dd>
</dl>

</dd>
</dl>

</div>
