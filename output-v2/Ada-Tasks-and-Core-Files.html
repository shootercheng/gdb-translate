<h4 class="subsubsection" id="Tasking-Support-when-Debugging-Core-Files"><span>15.4.10.8 调试核心文件时的任务支持<a class="copiable-link" href="#Tasking-Support-when-Debugging-Core-Files"> ¶</a></span></h4>
<a class="index-entry-id" id="index-Ada-tasking-and-core-file-debugging"></a>

<p>在检查核心文件时，与调试正在运行的程序不同，任务支持可能会受到限制，甚至不可用，这取决于所使用的平台。例如，在x86 - linux上，可以获取任务列表，但不支持任务切换。
</p>
<p>在某些平台上，调试器需要进行一些内存写入操作才能提供Ada任务支持。在检查核心文件时，这意味着必须使用命令‘<samp class="samp">&#34;set write on&#34;</samp>’（参见 <a class="pxref" href="Patching.html">修补程序</a>)以读写权限打开核心文件。在这种情况下，在使用 <small class="sc">GDB</small>检查核心文件之前，应该先对其进行备份。
</p>
</div>
