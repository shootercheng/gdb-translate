<h4 class="subsubsection" id="C-and-C_002b_002b-Type-and-Range-Checks"><span>15.4.1.5 C 和 C++<code class="t">++</code> 类型和范围检查<a class="copiable-link" href="#C-and-C_002b_002b-Type-and-Range-Checks"> ¶</a></span></h4>

<a class="index-entry-id" id="index-C-and-C_002b_002b-checks"></a>

<p>默认情况下，当 <small class="sc">GDB</small> 解析 C 或 C++<code class="t">++</code> 表达式时，会使用严格的类型检查。 但是，如果关闭类型检查， <small class="sc">GDB</small>
将允许某些非标准转换，例如将整数常量提升为指针。
</p>
<p>如果开启范围检查，会对数学运算进行检查。 数组索引不会被检查，因为它们通常用于索引本身不是数组的指针。
</p>
