<h4 class="subsubsection" id="The-Print-Command-With-Objective_002dC"><span>15.4.4.2 使用Objective - C的打印命令<a class="copiable-link" href="#The-Print-Command-With-Objective_002dC"> ¶</a></span></h4>
<a class="index-entry-id" id="index-Objective_002dC_002c-print-objects"></a>
<a class="index-entry-id" id="index-print_002dobject"></a>
<a class="index-entry-id" id="index-po-_0028print_002dobject_0029"></a>

<p>打印命令已扩展为可接受方法。例如：
</p>
<div class="example smallexample">
<pre class="example-preformatted">print -[<var class="var">对象</var> hash]
</pre></div>

<a class="index-entry-id" id="index-print-an-Objective_002dC-object-description"></a>
<a class="index-entry-id" id="index-_005fNSPrintForDebugger_002c-and-printing-Objective_002dC-objects"></a>
<p>将告知 <small class="sc">GDB</small> 向 <code class="code">hash</code> 对象发送 <var class="var">消息</var>
并打印结果。此外，还添加了一个额外的命令
<code class="code">print-object</code> 或 <code class="code">po</code> 简称，用于打印对象的描述。但是，此命令可能仅适用于某些定义了特定钩子函数的Objective - C库 <code class="code">_NSPrintForDebugger</code>, 已定义。
</p>
</div>
