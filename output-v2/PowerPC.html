<h4 class="subsection" id="PowerPC-1"><span>21.4.6 PowerPC<a class="copiable-link" href="#PowerPC-1"> ¶</a></span></h4>
<a class="index-entry-id" id="index-PowerPC-architecture"></a>

<p>当 <small class="sc">GDB</small> 调试PowerPC架构时，它提供了一组伪寄存器，用于检查存储在浮点寄存器中的128位宽十进制浮点数。这些值必须存储在两个连续的寄存器中，并且始终从偶数寄存器开始，例如
<code class="code">f0</code> 或 <code class="code">f2</code>.
</p>
<p>伪寄存器的范围从 <code class="code">$dl0</code> 到 <code class="code">$dl15</code>, 并且是通过将偶数/奇数寄存器对组合而成 <code class="code">f0</code> 和 <code class="code">f1</code> 对于 <code class="code">$dl0</code>,
<code class="code">f2</code> 和 <code class="code">f3</code> 对于 <code class="code">$dl1</code> 等等。
</p>
<p>对于POWER7处理器， <small class="sc">GDB</small> 提供了一组伪寄存器，即64位宽的扩展浮点寄存器（‘<samp class="samp">f32</samp>’ 到 ‘<samp class="samp">f63</samp>’）。
</p>
