<h4 class="subsection" id="LoongArch-Features-1"><span>G.5.6 龙芯架构特性<a class="copiable-link" href="#LoongArch-Features-1"> ¶</a></span></h4>
<a class="index-entry-id" id="index-target-descriptions_002c-LoongArch-Features"></a>

<p>对于龙芯架构目标，需要 ‘<samp class="samp">org.gnu.gdb.loongarch.base</samp>’ 特性。它应包含寄存器 ‘<samp class="samp">r0</samp>’ 到 ‘<samp class="samp">r31</samp>’、
‘<samp class="samp">程序计数器</samp>’ 和 ‘<samp class="samp">错误地址寄存器</samp>’。可以使用架构名称（‘<samp class="samp">r0</samp>’、
‘<samp class="samp">r1</samp>’ 等），也可以使用ABI名称（‘<samp class="samp">零寄存器</samp>’、‘<samp class="samp">返回地址寄存器</samp>’ 等）。
</p>
<p>‘<samp class="samp">org.gnu.gdb.loongarch.fpu</samp>’ 特性是可选的。如果存在，
它应包含寄存器 ‘<samp class="samp">f0</samp>’ 到 ‘<samp class="samp">f31</samp>’、‘<samp class="samp">浮点条件码寄存器</samp>’ 和 ‘<samp class="samp">浮点控制状态寄存器</samp>’。
</p>
