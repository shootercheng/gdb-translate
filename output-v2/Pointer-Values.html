<h4 class="unnumberedsubsubsec" id="Pointer-Values-1"><span>指针值<a class="copiable-link" href="#Pointer-Values-1"> ¶</a></span></h4>
<a class="index-entry-id" id="index-pointer-values_002c-in-file_002di_002fo-protocol"></a>

<p>指向目标数据的指针按原样传输。对于长度未作为函数调用一部分传输的缓冲区指针（即字符串），有一个例外。字符串作为指针/长度对传输，两者均为十六进制值，例如
</p>
<div class="example smallexample">
<pre class="example-preformatted"><code class="code">1aaf/12</code>
</pre></div>

<p>这是一个指向位于位置 0x1aaf 处长度为 18 字节数据的指针。长度定义为字符串的完整字节长度，包括尾随的空字节。例如，字符串 <code class="code">&#34;hello world&#34;</code>
位于地址 0x123456 处的字符串按如下方式传输
</p>
<div class="example smallexample">
<pre class="example-preformatted"><code class="code">123456/d</code>
</pre></div>

</div>
