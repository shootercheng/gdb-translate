<h4 class="subsubsection" id="Stopping-at-the-Very-Beginning"><span>15.4.10.5 在最开始处停止<a class="copiable-link" href="#Stopping-at-the-Very-Beginning"> ¶</a></span></h4>

<a class="index-entry-id" id="index-breakpointing-Ada-elaboration-code"></a>
<p>有时需要在详细处理期间以及到达主程序之前调试程序。
根据Ada参考手册的定义，详细处理代码是从一个名为的过程中调用的
<code class="code">adainit</code>。 要使程序运行到详细处理开始，只需使用以下两个命令：
<code class="code">tbreak adainit</code> 和 <code class="code">run</code>.
</p>
