<h4 class="unnumberedsubsubsec" id="struct-timeval-1"><span>结构体 timeval<a class="copiable-link" href="#struct-timeval-1"> ¶</a></span></h4>
<a class="index-entry-id" id="index-struct-timeval_002c-in-file_002di_002fo-protocol"></a>

<p>文件 I/O 协议使用的类型缓冲区 <code class="code">struct timeval</code> 定义如下：
</p>
<div class="example smallexample">
<pre class="example-preformatted">结构体 timeval {
    time_t tv_sec;  /* 秒 */
    long   tv_usec; /* 微秒 */
};
</pre></div>

<p>整数数据类型符合相应章节（见 <a class="ref" href="Integral-Datatypes.html">整数数据类型</a>，了解详情）中给出的定义，因此该结构体大小为 8 字节。
</p>
