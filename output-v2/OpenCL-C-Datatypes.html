<h4 class="subsubsection" id="OpenCL-C-Datatypes-1"><span>15.4.5.1 OpenCL C 数据类型<a class="copiable-link" href="#OpenCL-C-Datatypes-1"> ¶</a></span></h4>

<a class="index-entry-id" id="index-OpenCL-C-Datatypes"></a>
<p><small class="sc">GDB</small> 支持 OpenCL 1.1 指定的内置标量和向量数据类型。此外， <code class="code">cl_khr_fp16</code> 和 <code class="code">cl_khr_fp64</code> OpenCL 扩展中的半精度和双精度浮点数据类型也为 <small class="sc">GDB</small>所知。
