<h4 class="subsection" id="The-F-Request-Packet-1"><span>E.14.3   <code class="code">F</code> 请求数据包<a class="copiable-link" href="#The-F-Request-Packet-1"> ¶</a></span></h4>
<a class="index-entry-id" id="index-file_002di_002fo-request-packet"></a>
<a class="index-entry-id" id="index-F-request-packet"></a>

<p>该 <code class="code">F</code> 请求数据包具有以下格式：
</p>
<dl class="table">
<dt>‘<samp class="samp">F<var class="var">调用 ID</var>,<var class="var">参数…</var></samp>’</dt>
<dd>
<p><var class="var">调用 ID</var> 是用于指示要调用的主机系统调用的标识符。
这只是函数的名称。
</p>
<p><var class="var">参数…</var> 是系统调用的参数。  
参数是十六进制整数值，对于标量数据类型，是实际值；对于复合数据类型和未指定的内存区域，是指向目标缓冲区空间的指针；对于字符串参数，是指针/长度对。 这些参数作为逗号分隔的列表附加到 <var class="var">调用 ID</var> 后面。 所有值都以 ASCII 字符串表示形式传输，指针/长度对用斜杠分隔。
</p>
</dd>
</dl>
