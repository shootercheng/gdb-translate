<h2 class="chapter" id="Altering-Execution"><span>17 修改执行<a class="copiable-link" href="#Altering-Execution"> ¶</a></span></h2>

<p>一旦你认为在程序中发现了一个错误，你可能想确定纠正这个明显的错误是否会在程序的其余运行中产生正确的结果。你可以通过实验来找到答案，使用 <small class="sc">GDB</small> 修改程序执行的功能。
</p>
<p>例如，你可以将新值存储到变量或内存位置，给你的程序发送一个信号，在不同的地址重新启动它，甚至提前从一个函数返回。
</p>
