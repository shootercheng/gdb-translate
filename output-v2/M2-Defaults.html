<h4 class="subsubsection" id="Modula_002d2-Defaults"><span>15.4.9.5 Modula - 2 默认设置<a class="copiable-link" href="#Modula_002d2-Defaults"> ¶</a></span></h4>
<a class="index-entry-id" id="index-Modula_002d2-defaults"></a>

<p>如果类型和范围检查由 <small class="sc">GDB</small>自动设置，那么每当工作语言更改为 Modula - 2 时，它们都默认设置为 <code class="code">on</code> 。无论你还是 <small class="sc">GDB</small>
选择了工作语言，都会发生这种情况。
</p>
<p>如果你允许 <small class="sc">GDB</small> 自动设置语言，那么输入从以 <samp class="file">.mod</samp> 结尾的文件编译的代码会将工作语言设置为 Modula - 2。请参阅 <a class="xref" href="Automatically.html">拥有 <small class="sc">GDB</small>
推断源语言</a>以获取更多详细信息。
</p>
