<h3 class="section" id="The-Server-Prefix"><span>28.2 服务器前缀<a class="copiable-link" href="#The-Server-Prefix"> ¶</a></span></h3>
<a class="index-entry-id" id="index-server-prefix"></a>

<p>如果您在命令前加上 ‘<samp class="samp">服务器 </samp>’，那么它既不会影响
命令历史记录，也不会影响 <small class="sc">GDB</small>在以下情况下重复执行哪个
命令的概念，如果 <kbd class="key">回车键</kbd> 在空行上按下。这
意味着前端可以以透明的方式在用户不知情的情况下运行命令。
</p>
<p>该 <code class="code">server </code> 前缀不会影响将值记录到
值历史记录中；若要打印一个值而不将其记录到值历史记录中，请使用 <code class="code">output</code> 命令而不是
<code class="code">print</code> 命令。
</p>
<p>使用此前缀还会禁用确认请求
（请参阅 <a class="pxref" href="Messages_002fWarnings.html#confirmation-requests">确认请求</a>)。
</p>
