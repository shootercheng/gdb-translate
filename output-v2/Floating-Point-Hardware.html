<h3 class="section" id="Floating-Point-Hardware-1"><span>10.15 浮点硬件<a class="copiable-link" href="#Floating-Point-Hardware-1"> ¶</a></span></h3>
<a class="index-entry-id" id="index-floating-point"></a>

<p>根据配置情况， <small class="sc">GDB</small> 可能能够为你提供有关浮点硬件状态的更多信息。
</p>
<dl class="table">
<dt><a id="index-info-float"></a><span><code class="code">info float</code><a class="copiable-link" href="#index-info-float"> ¶</a></span></dt>
<dd><p>显示有关浮点运算单元的硬件相关信息。确切的内容和布局会因浮点芯片而异。目前，‘<samp class="samp">info float</samp>’ 在 ARM 和 x86 机器上受支持。
</p></dd>
</dl>
