<h4 class="subsection" id="RX-Features-1"><span>G.5.14 RX 特性<a class="copiable-link" href="#RX-Features-1"> ¶</a></span></h4>
<a class="index-entry-id" id="index-target-descriptions_002c-RX-Features"></a>

<p>‘<samp class="samp">org.gnu.gdb.rx.core</samp>’ 特性是 RX 目标所必需的。它应包含寄存器 ‘<samp class="samp">r0</samp>’ 到
‘<samp class="samp">r15</samp>’、‘<samp class="samp">usp</samp>’、‘<samp class="samp">isp</samp>’、‘<samp class="samp">psw</samp>’、‘<samp class="samp">pc</samp>’、‘<samp class="samp">intb</samp>’、
‘<samp class="samp">bpsw</samp>’、‘<samp class="samp">bpc</samp>’、‘<samp class="samp">fintv</samp>’、‘<samp class="samp">fpsw</samp>’ 和 ‘<samp class="samp">acc</samp>’。
</p>
