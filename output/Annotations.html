<h2 class="chapter" id="gdb-注释"><span>28 GDB注释<a class="copiable-link" href="#gdb-注释"> &para;</a></span></h2>

<p>本章描述GDB中的注释。注释旨在将GDB与图形用户界面或其他希望在相对较高层次上与GDB交互的类似程序进行接口连接。
</p>
<p>注释机制在很大程度上已被GDB/MI取代（见 <a class="pxref" href="GDB_002fMI.html">GDB/MI接口</a>）。
</p>
