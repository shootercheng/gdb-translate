<h4 class="subsubsection" id="Modula_002d2-Type-and-Range-Checks"><span>15.4.9.7 Modula-2类型和范围检查<a class="copiable-link" href="#Modula_002d2-Type-and-Range-Checks"> &para;</a></span></h4>
<a class="index-entry-id" id="index-Modula_002d2-checks"></a>

<blockquote class="quotation">
<p><em class="emph">警告：</em> 在本版本中，<small class="sc">GDB</small> 尚未执行类型或范围检查。
</p></blockquote>

<p><small class="sc">GDB</small> 认为两个Modula-2变量类型等效当：
</p>
<ul class="itemize mark-bullet">
<li>它们的类型通过 <code class="code">TYPE <var class="var">t1</var> = <var class="var">t2</var></code> 语句声明为等效

</li><li>它们在同一行声明。（注意：这适用于 <small class="sc">GNU</small> Modula-2编译器，但其他编译器可能不适用。）
</li></ul>

<p>只要启用了类型检查，任何尝试组合类型不等效的变量都是错误。
</p>
<p>范围检查应用于所有数学运算、赋值、数组索引边界以及所有内置函数和过程。
</p>
