<h4 class="subsection" id="BPF-1"><span>21.3.3 BPF<a class="copiable-link" href="#BPF-1"> &para;</a></span></h4>

<dl class="table">
<dt><code class="code">target sim <span class="r">[</span><var class="var">simargs</var><span class="r">]</span> &hellip;</code></dt> <dd><p>GDB的BPF模拟器接受以下可选参数。
</p>
<dl class="table">
<dt><code class="code">--skb-data-offset=<var class="var">offset</var></code></dt> <dd><p>告诉模拟器内核 <code class="code">struct sk_buff</code> 结构中 <code class="code">skb_data</code> 字段的偏移量（以字节为单位）。此偏移量由一些BPF特定用途的加载/存储指令使用。默认值为0。
</p></dd>

</dd>
