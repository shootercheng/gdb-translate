<h4 class="subsubsection" id="Tasking-Support-when-Debugging-Core-Files"><span>15.4.10.8 调试核心文件时的任务支持<a class="copiable-link" href="#Tasking-Support-when-Debugging-Core-Files"> &para;</a></span></h4>
<a class="index-entry-id" id="index-Ada任务与核心文件调试"></a>

<p>与调试正在运行的程序不同，在检查核心文件时，任务支持可能会受到限制甚至不可用，这取决于所使用的平台。
例如，在x86 - linux上，可以获取任务列表，但不支持任务切换。
</p>
<p>在某些平台上，调试器需要执行一些内存写入操作以提供Ada任务支持。在检查核心文件时，这意味着必须使用命令‘<samp class="samp">&quot;set write on&quot;</samp>’以读写权限打开核心文件（见 <a class="pxref" href="Patching.html">修补程序</a>）。
在这种情况下，在用<small class="sc">GDB</small>检查核心文件之前，应该对其进行备份。
</p>
