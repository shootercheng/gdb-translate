<h3 class="section" id="服务器前缀"><span>28.2 服务器前缀<a class="copiable-link" href="#服务器前缀"> &para;</a></span></h3>
<a class="index-entry-id" id="index-server-prefix"></a>

<p>如果你在一个命令前加上‘<samp class="samp">server </samp>’，那么它将不会影响命令历史记录，也不会影响当单独在一行上按下<kbd class="key">RET</kbd>时GDB对要重复哪个命令的认知。这意味着命令可以由前端以透明的方式在用户背后运行。
</p>
<p>‘<code class="code">server </code>’前缀不会影响将值记录到值历史记录中；要打印一个值而不将其记录到值历史记录中，请使用‘<code class="code">output</code>’命令而不是‘<code class="code">print</code>’命令。
</p>
<p>使用这个前缀还会禁用确认请求（见 <a class="pxref" href="Messages_002fWarnings.html#confirmation-requests">确认请求</a>）。
</p>
