<h4 class="subsection" id="Atmel-AVR"><span>21.3.9 爱特梅尔AVR<a class="copiable-link" href="#Atmel-AVR"> &para;</a></span></h4>  
<a class="index-entry-id" id="index-AVR"></a>

<p>当配置为调试爱特梅尔AVR时，GDB支持以下特定于AVR的命令：
</p>
<dl class="table">
<dt><a class="index-entry-id" id="index-I_002fO-registers-_0028Atmel-AVR_0029"></a>
<a id="index-info-io_005fregisters_002c-AVR"></a><span><code class="code">info io_registers</code><a class="copiable-link" href="#index-info-io_005fregisters_002c-AVR"> &para;</a></span></dt>
<dd><p>此命令显示有关AVR I/O寄存器的信息。对于每个寄存器，GDB会打印其编号和值。
</p></dd>
</dl>
