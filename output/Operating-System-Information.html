<h2 class="appendix" id="操作系统信息-1"><span>附录H 操作系统信息<a class="copiable-link" href="#操作系统信息-1"> &para;</a></span></h2>
<a class="index-entry-id" id="索引-操作系统信息"></a>

<p><small class="sc">GDB</small> 的用户常常希望获取有关目标上运行的操作系统状态的信息，例如进程列表或打开文件列表。本节描述了实现这一目的的机制。该机制类似于目标特性机制（见 <a class="pxref" href="目标描述.html">目标描述</a>）但侧重于目标的不同方面。
</p>
<p>操作系统信息是通过远程协议从目标获取的，使用 &lsquo;<samp class="samp">qXfer</samp>&rsquo; 请求（见 <a class="pxref" href="通用查询数据包.html#qXfer-osdata-read">qXfer osdata read</a>）。请求中的对象名称应为 &lsquo;<samp class="samp">osdata</samp>&rsquo;，并且 <var class="var">附件</var> 标识要获取的数据。
</p>
