<h4 class="subsubsection" id="C-and-C_002b_002b-Defaults"><span>15.4.1.4 C和C++默认设置<a class="copiable-link" href="#C-and-C_002b_002b-Defaults"> &para;</a></span></h4>

<a class="index-entry-id" id="index-C-and-C_002b_002b-defaults"></a>

<p>如果允许GDB自动设置范围检查，那么每当工作语言切换到C或C++时，它的默认设置为“关闭”。无论你还是GDB选择工作语言，都会发生这种情况。
</p>
<p>如果允许GDB自动设置语言，它会识别文件名以.c、.C或.cc等结尾的源文件，并且当GDB进入从这些文件之一编译的代码时，它会将工作语言设置为C或C++。
有关更多详细信息，请参阅 <a class="xref" href="Automatically.html">让GDB推断源语言</a>。
</p>
