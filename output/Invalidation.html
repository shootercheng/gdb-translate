<h3 class="section" id="无效化通知"><span>28.5无效化通知<a class="copiable-link" href="#无效化通知"> &para;</a></span></h3>

<a class="index-entry-id" id="索引-无效化消息的注释"></a>
<p>以下注释表示某些状态可能已更改。
</p>
<dl class="table">
<dt><a id="索引-帧无效注释"></a><span><code class="code">^Z^Zframes-invalid</code><a class="copiable-link" href="#索引-帧无效注释"> &para;</a></span></dt>
<dd>
<p>帧（例如，<code class="code">backtrace</code>命令的输出）可能已更改。
</p>
</dd>
<dt><a id="索引-断点无效注释"></a><span><code class="code">^Z^Zbreakpoints-invalid</code><a class="copiable-link" href="#索引-断点无效注释"> &para;</a></span></dt>
<dd>
<p>断点可能已更改。例如，用户刚刚添加或删除了一个断点。
</p></dd>
</dl>
