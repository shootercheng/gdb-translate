<h2 class="chapter" id="Reporting-Bugs-in-gdb"><span>32 在<small class="sc">GDB</small>中报告错误<a class="copiable-link" href="#Reporting-Bugs-in-gdb"> &para;</a></span></h2>
<a class="index-entry-id" id="index-bugs-in-gdb"></a>
<a class="index-entry-id" id="index-reporting-bugs-in-gdb"></a>

<p>你的错误报告对于使<small class="sc">GDB</small>可靠起着至关重要的作用。
</p>
<p>报告一个错误可能会为你带来问题的解决方案，也可能不会。但无论如何，错误报告的主要功能是通过使下一版本的<small class="sc">GDB</small>运行得更好来帮助整个社区。错误报告是你对<small class="sc">GDB</small>维护的贡献。
</p>
<p>为了使错误报告达到其目的，你必须包含使我们能够修复错误的信息。
</p>
