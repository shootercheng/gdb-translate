<h2 class="chapter" id="Configuration_002dSpecific-Information"><span>21特定配置信息<a class="copiable-link" href="#Configuration_002dSpecific-Information"> &para;</a></span></h2>

<p>虽然几乎所有的 <small class="sc">GDB</small> 命令在调试器的所有本机和交叉版本中都可用，但也有一些例外。本章描述了仅在某些配置中可用的数据。
</p>
<p>配置主要有三大类：本机配置，其中主机和目标相同；嵌入式操作系统配置，通常适用于几种不同的处理器架构；裸嵌入式处理器，它们彼此差异很大。
</p>
