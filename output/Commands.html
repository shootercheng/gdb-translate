<h2 class="chapter" id="gdb命令"><span>3 GDB命令<a class="copiable-link" href="#gdb命令"> &para;</a></span></h2>

<p>如果缩写不产生歧义，你可以将GDB命令缩写为命令名称的前几个字母；并且你可以通过仅按<kbd class="key">RET</kbd>键来重复某些GDB命令。你还可以使用<kbd class="key">TAB</kbd>键让GDB补全命令中的其余单词（或者如果有多种可能性，向你展示可用的替代选项）。
</p>
