<h4 class="unnumberedsubsubsec" id="Memory-Transfer-1"><span>内存传输<a class="copiable-link" href="#Memory-Transfer-1"> &para;</a></span></h4>
<a class="index-entry-id" id="index-memory-transfer_002c-in-file_002di_002fo-protocol"></a>

<p>使用内存读或写传输的结构化数据（例如，一个<code class="code">struct stat</code>）预期采用特定协议的格式，所有标量多字节数据类型均为大端序。在发送<code class="code">F</code>数据包之前，目标需要进行转换以达到这种表示形式，并且在<small class="sc">GDB</small>将内存传输到目标之前也需要进行转换操作。指向结构化数据的传输指针应随时指向已经进行过强制转换的数据。
</p>
