<h3 class="section" id="不受支持的语言-1"><span>15.5不受支持的语言<a class="copiable-link" href="#不受支持的语言-1"> &para;</a></span></h3>

<a class="index-entry-id" id="索引-不受支持的语言"></a>
<a class="index-entry-id" id="索引-最小语言"></a>
<p>除了其他完全支持的编程语言外，GDB还提供了一种伪语言，称为<code>minimal</code>。
它并不代表一种真正的编程语言，但提供了一组与C或汇编语言提供的功能相近的功能。
这应该允许在调试使用GDB当前不支持的语言的应用程序时执行大多数简单操作。
</p>
<p>如果语言设置为<code>auto</code>，当当前帧对应于一种不受支持的语言时，GDB将自动选择这种语言。
</p>
