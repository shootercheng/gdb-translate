<h4 class="subsection" id="Synopsys-ARC"><span>21.3.1 Synopsys ARC<a class="copiable-link" href="#Synopsys-ARC"> &para;</a></span></h4>
<a class="index-entry-id" id="index-Synopsys-ARC"></a>
<a class="index-entry-id" id="index-ARC-specific-commands"></a>
<a class="index-entry-id" id="index-ARC600"></a>
<a class="index-entry-id" id="index-ARC700"></a>
<a class="index-entry-id" id="index-ARC-EM"></a>
<a class="index-entry-id" id="index-ARC-HS"></a>

<p><small class="sc">GDB</small>提供了以下特定于ARC的命令：
</p>
<dl class="table">
<dt><a id="index-set-debug-arc"></a><span><code class="code">set debug arc</code><a class="copiable-link" href="#index-set-debug-arc"> &para;</a></span></dt>
<dd><p>控制ARC特定调试消息的级别。使用0表示不显示消息（默认），1表示调试消息，2表示更多调试消息。 
</p>
</dd>
<dt><a id="index-show-debug-arc"></a><span><code class="code">show debug arc</code><a class="copiable-link" href="#index-show-debug-arc"> &para;</a></span></dt>
<dd><p>显示当前正在运行的ARC特定调试的级别。
</p>
</dd>
<dt><a id="index-maint-print-arc-arc_002dinstruction"></a><span><code class="code">maint print arc arc-instruction <var class="var">address</var></code><a class="copiable-link" href="#index-maint-print-arc-arc_002dinstruction"> &para;</a></span></dt>
<dd><p>打印给定地址处指令的内部反汇编信息。
</p>
</dd>
</dl>
