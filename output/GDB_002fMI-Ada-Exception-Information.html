<h4 class="subsection" id="gdb_002fmi-Ada-Exception-Information"><span>27.5.7 <small class="sc">GDB/MI</small> Ada异常信息<a class="copiable-link" href="#gdb_002fmi-Ada-Exception-Information"> &para;</a></span></h4>

<p>每当因为程序在遇到异常捕获点后停止而发出一个<code class="code">*stopped</code>记录时（见<a class="pxref" href="Set-Catchpoints.html">设置捕获点</a>），<small class="sc">GDB</small>会通过<code class="code">exception-name</code>字段提供引发的异常的名称。此外，对于带有异常消息引发的异常， <small class="sc">GDB</small>会通过<code class="code">exception-message</code>字段提供该消息。
</p>
