<h4 class="subsection" id="一些杂项命令"><span>33.4.8一些杂项命令<a class="copiable-link" href="#一些杂项命令"> &para;</a></span></h4>
<dl class="ftable">
<dt><a id="index-re_002dread_002dinit_002dfile-_00非标准字符_0028C_002dx-C_002dr_0029"></a><span><code class="code">re-read-init-file (C-x C-r)</code><a class="copiable-link" href="#index-re_002dread_002dinit_002dfile-_00非标准字符_0028C_002dx-C_002dr_0029"> &para;</a></span></dt>
<dd><p>读取<var class="var">inputrc</var>文件的内容，并合并在其中找到的任何绑定或变量赋值。
</p>
</dd>
<dt><a id="index-abort-_0028C_002dg_0029"></a><span><code class="code">abort (C-g)</code><a class="copiable-link" href="#index-abort-_00非标准字符_0028C_002dg_0029"> &para;</a></span></dt>
<dd><p>中止当前的编辑命令并
敲响终端的响铃（取决于<code class="code">bell-style</code>的设置）。
</p>
</dd>
<dt><a id="index-do_002dlowercase_002dversion-_0028M_002dA_002c-M_002dB_002c-M_002dx_002c-_2026_0029"></a><span><code class="code">do-lowercase-version (M-A, M-B, M-<var class="var">x</var>, &hellip;)</code><a class="copiable-link" href="#index-do_002dlowercase_002dversion-_0028M_002dA_002c-M_002dB_002c-M_002dx_002c-_2026_0029"> &para;</a></span></dt>
<dd><p>如果元字符<var class="var">x</var>是大写的，则运行绑定到相应元小写字符的命令。
如果<var class="var">x</var>已经是小写，则行为未定义。
</p>
</dd>
