<h3 class="section" id="进程内代理协议-1"><span>31.1进程内代理协议<a class="copiable-link" href="#进程内代理协议-1"> &para;</a></span></h3>
<a class="index-entry-id" id="index-进程内代理协议"></a>

<p>进程内代理能够与GDB和GDBserver进行通信（见<a class="pxref" href="In_Process-Agent.html">进程内代理</a>）。本节记录了GDB或GDBserver与IPA之间用于通信的协议。一般来说，GDB或GDBserver向进程内代理发送命令（见<a class="pxref" href="IPA-Protocol-Commands.html">IPA协议命令</a>）和数据，然后进程内代理用命令的返回结果或其他一些信息进行回复。发送给进程内代理的数据由基本数据类型（如4字节或8字节类型）和复合类型（称为对象，见<a class="pxref" href="IPA-Protocol-Objects.html">IPA协议对象</a>）组成。
</p>
