<h3 class="section" id="错误-1"><span>第28.4节 错误<a class="copiable-link" href="#错误-1"> &para;</a></span></h3>
<a class="index-entry-id" id="index-错误、警告和中断的注释"></a>

<a class="index-entry-id" id="index-退出注释"></a>
<div class="example smallexample">
<pre class="example-preformatted">^Z^Z退出
</pre></div>

<p>此注释恰好在GDB响应中断之前出现。
</p>
<a class="index-entry-id" id="index-错误注释"></a>
<div class="example smallexample">
<pre class="example-preformatted">^Z^Z错误
</pre></div>

<p>此注释恰好在GDB响应错误之前出现。
</p>
<p>退出和错误注释表明，GDB正在处理的任何注释可能会突然结束。例如，如果一个<code class="code">值历史开始</code>注释之后跟着一个<code class="code">错误</code>，则不能期望收到匹配的<code class="code">值历史结束</code>。然而，也不能期望不会收到它；错误注释并不一定意味着GDB会立即一直返回到顶级。
</p>
<a class="index-entry-id" id="index-错误开始注释"></a>
<p>退出或错误注释之前可能会有
</p>
<div class="example smallexample">
<pre class="example-preformatted">^Z^Z错误开始
</pre></div>

<p>在该注释与退出或错误注释之间的任何输出都是错误消息。
</p>
<p>警告消息尚未添加注释。
</p>
</div>
