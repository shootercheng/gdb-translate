<h4 class="subsection" id="HPPA-1"><span>21.4.5 HPPA<a class="copiable-link" href="#HPPA-1"> ¶</a></span></h4>
<a class="index-entry-id" id="index-HPPA-support"></a>

<p>当GDB调试HP PA架构时，它提供以下特殊命令：
</p>
<dl class="table">
<dt><a id="index-set-debug-hppa"></a><span><code class="code">set debug hppa</code><a class="copiable-link" href="#index-set-debug-hppa"> ¶</a></span></dt>
<dd><p>此命令确定是否显示特定于HPPA架构的调试消息。
</p>
</dd>
<dt><code class="code">show debug hppa</code></dt>
<dd><p>显示是否显示HPPA调试消息。
</p>
</dd>
<dt><a id="index-maint-print-unwind_002c-HPPA"></a><span><code class="code">maint print unwind <var class="var">address</var></code><a class="copiable-link" href="#index-maint-print-unwind_002c-HPPA"> ¶</a></span></dt>
<dd><p>此命令显示给定<var class="var">地址</var>处的展开表条目的内容。
</p>
</dd>
</dl>
