<h4 class="subsection" id="Openrisc-1000-Features"><span>G.5.11 Openrisc - 1000特性<a class="copiable-link" href="#Openrisc-1000-Features"> &para;</a></span></h4>
<a class="index-entry-id" id="index-target-descriptions_002c-OpenRISC-1000-features"></a>

<p>OpenRISC 1000目标需要“<samp class="samp">org.gnu.gdb.or1k.group0</samp>”特性。它应包含32个通用寄存器（从“<samp class="samp">r0</samp>”到“<samp class="samp">r31</samp>”）、“<samp class="samp">ppc</samp>”、“<samp class="samp">npc</samp>”和“<samp class="samp">sr</samp>”。
