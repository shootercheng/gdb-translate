<h4 class="unnumberedsubsubsec" id="指针值-1"><span>指针值<a class="copiable-link" href="#指针值-1"> &para;</a></span></h4>

<a class="index-entry-id" id="index-指针值_002c-in-file_002di_002fo-protocol"></a>

<p>指向目标数据的指针按原样传输。对于指向缓冲区的指针有一个例外，其长度不作为函数调用的一部分进行传输，即字符串。字符串作为指针/长度对传输，两者均为十六进制值，例如
</p>
<div class="example smallexample">
<pre class="example-preformatted"><code class="code">1aaf/12</code>
</pre></div>

<p>这是指向位于0x1aaf位置的18字节数据的指针。长度定义为字符串的完整字节长度，包括尾随的空字节。例如，位于地址0x123456的字符串<code class="code">&quot;hello world&quot;</code>按以下方式传输
</p>
<div class="example smallexample">
<pre class="example-preformatted"><code class="code">123456/d</code>
</pre></div>

</div>
