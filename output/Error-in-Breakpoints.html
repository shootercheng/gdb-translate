<h4 class="subsection" id="g_t_0060_0060Cannot-insert-breakpoints_0027_0027"><span>5.1.11 &ldquo;无法插入断点&rdquo;<a class="copiable-link" href="#g_t_0060_0060Cannot-insert-breakpoints_0027_0027"> &para;</a></span></h4>

<p>如果你请求了过多的活动硬件辅助断点和观察点，你将会看到此错误消息：
</p>
<div class="example smallexample">
<pre class="example-preformatted">已停止；无法插入断点。
你可能请求了过多的硬件断点和观察点。
</pre></div>

<p>当你尝试恢复程序运行时会打印此消息，因为只有在那时GDB才确切知道需要插入多少硬件断点和观察点。
</p>
<p>当打印此消息时，你需要禁用或移除一些硬件辅助断点和观察点，然后继续。
</p>
</div>
