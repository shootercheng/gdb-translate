<h4 class="subsubsection" id="使用Objective-C的打印命令"><span>15.4.4.2 使用Objective-C的打印命令<a class="copiable-link" href="#使用Objective-C的打印命令"> &para;</a></span></h4>
<a class="index-entry-id" id="index-Objective-C_002c打印对象"></a>
<a class="index-entry-id" id="index-print-对象"></a>
<a class="index-entry-id" id="index-po-_0028print-对象_0029"></a>

<p>打印命令也已扩展以接受方法。例如：
</p>
<div class="example smallexample">
<pre class="example-preformatted">print -[<var class="var">对象</var> hash]
</pre></div>

<a class="index-entry-id" id="index-打印一个Objective-C对象描述"></a>
<a class="index-entry-id" id="index-_005fNSPrintForDebugger_002c和打印Objective-C对象"></a>
<p>这将告诉<small class="sc">GDB</small>向<var class="var">对象</var>发送<code class="code">hash</code>消息并打印结果。此外，还添加了一个额外的命令，<code class="code">print-object</code>或简称为<code class="code">po</code>，用于打印对象的描述。但是，此命令可能仅适用于某些定义了特定钩子函数<code class="code">_NSPrintForDebugger</code>的Objective-C库。
</p>
</div>
