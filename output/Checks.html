<h3 class="section" id="类型和范围检查"><span>第15.3节 类型和范围检查<a class="copiable-link" href="#类型和范围检查"> &para;</a></span></h3>

<p>有些语言旨在通过一系列编译时和运行时检查来防止你犯一些看似常见的错误。这些检查包括检查函数和运算符的参数类型，并确保在运行时捕获数学溢出。一旦程序编译完成，像这样的检查有助于通过消除类型不匹配并在程序运行时对范围错误进行主动检查来确保程序的正确性。
</p>
<p>默认情况下，GDB根据当前源语言的规则检查这些错误。虽然GDB不会检查程序中的语句，但例如它可以通过 <code class="code">print</code> 命令检查直接输入到GDB中进行求值的表达式。
</p>
