<h4 class="subsection" id="龙芯架构特性-1"><span>G.5.6龙芯架构特性<a class="copiable-link" href="#龙芯架构特性-1"> &para;</a></span></h4>
<a class="index-entry-id" id="index-target-descriptions_002c-龙芯架构特性"></a>

<p>龙芯架构目标需要 &lsquo;<samp class="samp">org.gnu.gdb.loongarch.base</samp>&rsquo; 特性。它应该包含从 &lsquo;<samp class="samp">r0</samp>&rsquo; 到 &lsquo;<samp class="samp">r31</samp>&rsquo;、&lsquo;<samp class="samp">pc</samp>&rsquo; 和 &lsquo;<samp class="samp">badv</samp>&rsquo; 这些寄存器。既可以使用架构名称（&lsquo;<samp class="samp">r0</samp>&rsquo;、&lsquo;<samp class="samp">r1</samp>&rsquo; 等），也可以使用ABI名称（&lsquo;<samp class="samp">zero</samp>&rsquo;、&lsquo;<samp class="samp">ra</samp>&rsquo; 等）。
</p>
<p>&lsquo;<samp class="samp">org.gnu.gdb.loongarch.fpu</samp>&rsquo; 特性是可选的。如果存在，它应该包含从 &lsquo;<samp class="samp">f0</samp>&rsquo; 到 &lsquo;<samp class="samp">f31</samp>&rsquo;、&lsquo;<samp class="samp">fcc</samp>&rsquo; 和 &lsquo;<samp class="samp">fcsr</samp>&rsquo; 这些寄存器。
</p>
