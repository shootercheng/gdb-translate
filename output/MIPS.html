<h4 class="subsection" id="MIPS-1"><span>21.4.4 MIPS<a class="copiable-link" href="#MIPS-1"> &para;</a></span></h4>

<a class="index-entry-id" id="index-stack-on-Alpha"></a>
<a class="index-entry-id" id="index-stack-on-MIPS"></a>
<a class="index-entry-id" id="index-Alpha-stack"></a>
<a class="index-entry-id" id="index-MIPS-stack"></a>
<p>基于Alpha和MIPS的计算机使用一种不同寻常的栈帧，这有时需要GDB在目标代码中向后搜索以找到函数的开头。</p>
<a class="index-entry-id" id="index-response-time_002c-MIPS-debugging"></a>
<p>为了提高响应速度（特别是对于嵌入式应用程序，在这种情况下，GDB可能限于通过慢速串行线进行此搜索）你可能希望使用以下命令之一限制此搜索的大小：</p>
<dl class="table">
<dt><a id="index-heuristic_002dfence_002dpost-_0028Alpha_002c-MIPS_0029"></a><span><code class="code">set heuristic-fence-post <var class="var">limit</var></code><a class="copiable-link" href="#index-heuristic_002dfence_002dpost-_00
