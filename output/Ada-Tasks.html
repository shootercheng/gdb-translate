<h4 class="subsubsection" id="Extensions-for-Ada-Tasks"><span>15.4.10.7 Ada任务的扩展<a class="copiable-link" href="#Extensions-for-Ada-Tasks"> &para;</a></span></h4>
<a class="index-entry-id" id="index-Ada_002c-tasking"></a>

<p>对Ada任务的支持类似于对线程的支持（见<a class="pxref" href="Threads.html">调试多线程程序</a>）。GDB提供了以下与任务相关的命令：</p>
<dl class="table">
<dt><a id="index-info-tasks"></a><span><code class="code">info tasks</code><a class="copiable-link" href="#index-info-tasks"> &para;</a></span></dt>
<dd><p>此命令显示当前Ada任务的列表，如下例所示：</p>

<div class="example smallexample">
<pre class="example-preformatted">(gdb) info tasks
  ID       TID P-ID Pri State                 Name
