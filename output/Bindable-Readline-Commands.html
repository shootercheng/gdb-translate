<h3 class="section" id="可绑定的Readline命令-1"><span>33.4可绑定的Readline命令<a class="copiable-link" href="#可绑定的Readline命令-1"> &para;</a></span></h3>


<p>本节描述了可以绑定到键序列的Readline命令。
默认情况下，没有伴随键序列的命令名是未绑定的。
</p>
<p>在以下描述中，<em class="dfn">点</em>指的是当前光标位置，<em class="dfn">标记</em>指的是由<code class="code">set-mark</code>命令保存的光标位置。
点和标记之间的文本称为<em class="dfn">区域</em>。
</p>
