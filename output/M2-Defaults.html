<h4 class="subsubsection" id="Modula_002d2-Defaults"><span>15.4.9.5 Modula-2默认设置<a class="copiable-link" href="#Modula_002d2-Defaults"> ¶</a></span></h4>
<a class="index-entry-id" id="index-Modula_002d2-defaults"></a>

<p>如果类型和范围检查由GDB自动设置，那么每当工作语言切换到Modula-2时，它们都默认为“开启”。无论你还是GDB选择了工作语言，都会发生这种情况。
</p>
<p>如果你允许GDB自动设置语言，那么输入从文件名以<samp class="file">.mod</samp>结尾的文件编译而来的代码会将工作语言设置为Modula-2。有关更多详细信息，请参阅 <a class="xref" href="Automatically.html">让GDB推断源语言</a>。
</p>
