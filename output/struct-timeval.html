<h4 class="unnumberedsubsubsec" id="struct-timeval-1"><span>struct timeval<a class="copiable-link" href="#struct-timeval-1"> &para;</a></span></h4>
<a class="index-entry-id" id="index-struct-timeval_002c-in-file_002di_002fo-protocol"></a>

<p>文件I/O协议使用的<code class="code">struct timeval</code>类型的缓冲区定义如下：
</p>
<div class="example smallexample">
<pre class="example-preformatted">struct timeval {
    time_t tv_sec;  /* 秒 */
    long   tv_usec; /* 微秒 */
};
</pre></div>

<p>整数数据类型符合相应章节中给出的定义（详情见 <a class="ref" href="Integral-Datatypes.html">整数数据类型</a>），因此这个结构的大小为8字节。
</p>
