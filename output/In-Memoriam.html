<h二级标题 class="appendix" id="In-Memoriam-1"><span>附录A 纪念<a class="copiable-link" href="#In-Memoriam-1"> ¶</a></span></h二级标题>

<p><small class="sc">GDB</small>项目哀悼以下长期贡献者的离去：
</p>
<dl class="table">
<dt><code class="code">弗雷德·菲什</code></dt>
<dd><p>弗雷德是<small class="sc">GDB</small>的长期贡献者（1991 - 2006年），也是自由软件的总体贡献者。在<small class="sc">GDB</small>之外，他在阿米加世界以其一系列菲什磁盘和极客小工具项目而闻名。
</p>
</dd>
<dt><code class="code">迈克尔·斯奈德</code></dt>
<dd><p>迈克尔是<small class="sc">GDB</small>项目的全球维护者之一，早在1996年就有贡献记录，一直到2011年。除了日常参与外，他还是为<small class="sc">GDB</small>添加反向调试的主要推动力量。
</p></dd>
</dl>

<p>除了他们对项目的技术贡献外，他们也是自由软件社区中令人愉快的成员。我们会想念他们。
</p>
</div>
