<h3 class="section" id="Remote-Configuration-1"><span>20.4远程配置<a class="copiable-link" href="#Remote-Configuration-1"> &para;</a></span></h3>

<a class="index-entry-id" id="index-set-remote"></a>
<a class="index-entry-id" id="index-show-remote"></a>
<p>本节记录了调试远程程序时可用的配置选项。有关远程协议的文件I/O扩展的选项，请参阅 <a class="ref" href="system.html">系统调用允许</a>。
</p>
<dl class="table">
<dt><a class="index-entry-id" id="index-bits-in-remote-address"></a>
<a id="index-address-size-for-remote-targets"></a><span><code class="code">set remoteaddresssize <var class="var">bits</var></code><a class="copiable-link" href="#index-address-size-for-remote-targets"> &para;</a></span></dt>
<dd><p>将内存包中地址的最大大小设置为指定的位数。当 <small class="sc">GDB</small> 将地址传递给远程目标时，它会屏蔽该数字以上的地址位。默认值是目标地址中的位数。
</p>
</dd>
<dt><code class="code">show remoteaddresssize</code></dt>
