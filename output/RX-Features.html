<h4 class="subsection" id="RX特性-1"><span>G.5.14 RX特性<a class="copiable-link" href="#RX特性-1"> &para;</a></span></h4>
<a class="index-entry-id" id="index-target-descriptions_002c-RX特性"></a>

<p>RX目标需要 &lsquo;<samp class="samp">org.gnu.gdb.rx.core</samp>&rsquo; 特性。它应该包含寄存器 &lsquo;<samp class="samp">r0</samp>&rsquo; 到 &lsquo;<samp class="samp">r15</samp>&rsquo;、&lsquo;<samp class="samp">usp</samp>&rsquo;、&lsquo;<samp class="samp">isp</samp>&rsquo;、&lsquo;<samp class="samp">psw</samp>&rsquo;、&lsquo;<samp class="samp">pc</samp>&rsquo;、&lsquo;<samp class="samp">intb</samp>&rsquo;、&lsquo;<samp class="samp">bpsw</samp>&rsquo;、&lsquo;<samp class="samp">bpc</samp>&rsquo;、&lsquo;<samp class="samp">fintv</samp>&rsquo;、&lsquo;<samp class="samp">fpsw</samp>&rsquo; 和 &lsquo;<samp class="samp">acc</samp>&rsquo;。
