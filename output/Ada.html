<h4 class="subsection" id="Ada-1"><span>15.4.10 Ada<a class="copiable-link" href="#Ada-1"> &para;</a></span></h4>
<a class="index-entry-id" id="index-Ada"></a>

<p>为Ada对<small class="sc">GDB</small>所做的扩展仅支持来自<small class="sc">GNU</small> Ada（GNAT）编译器的输出。
目前不支持其他Ada编译器，尝试调试由它们生成的可执行文件很可能会很困难。
</p>
