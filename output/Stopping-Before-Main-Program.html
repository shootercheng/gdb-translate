<h4 class="subsubsection" id="在最开始处停止"><span>15.4.10.5在最开始处停止<a class="copiable-link" href="#在最开始处停止"> &para;</a></span></h4>

<a class="index-entry-id" id="索引-断点-Ada-详细说明代码"></a>
<p>有时需要在详细说明期间且在到达主程序之前调试程序。
如Ada参考手册中所定义，详细说明代码是从一个名为
<code class="code">adainit</code>的过程调用的。要将程序运行到详细说明开始处，只需使用以下两个命令：
<code class="code">tbreak adainit</code>和<code class="code">run</code>。
</p>
