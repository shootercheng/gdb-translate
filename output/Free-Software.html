<h3 class="unnumberedsec" id="Free-Software-1"><span>自由软件<a class="copiable-link" href="#Free-Software-1"> ¶</a></span></h3>

<p>GDB是 <em class="dfn">自由软件</em>，受GNU通用公共许可证（GPL）保护。GPL赋予你复制或改编一个已获许可程序的自由 —— 但每个获得副本的人也随之获得修改该副本的自由（这意味着他们必须能够访问源代码），以及分发更多副本的自由。典型的软件公司利用版权来限制你的自由；自由软件基金会则利用GPL来维护这些自由。
</p>
<p>从根本上说，通用公共许可证是一种声明你拥有这些自由且不能剥夺他人这些自由的许可证。
</p>
