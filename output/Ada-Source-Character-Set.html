<h4 class="subsubsection" id="Ada-Source-Character-Set-1"><span>15.4.10.10 Ada源字符集<a class="copiable-link" href="#Ada-Source-Character-Set-1"> ¶</a></span></h4>
<a class="index-entry-id" id="index-Ada_002c-source-character-set"></a>

<p>GNAT编译器支持多种用于源文件的字符集。请参阅 <a data-manual="gnat_ugn" href="https://gcc.gnu.org/onlinedocs/gnat_ugn/Character-Set-Control.html#Character-Set-Control">字符集控制</a>。<small class="sc">GDB</small> 也包含对此的支持。
</p>
<dl class="table">
<dt><a id="index-set-ada-source_00_2dcharset"></a><span><code class="code">set ada source-charset <var class="var">charset</var></code><a class="copiable-link" href="#index-set-ada-source_00_2dcharset"> ¶</a></span></dt>
<dd><p>设置Ada的源字符集。该字符集必须由GNAT支持。由于此设置会影响程序调试信息中符号的解码，因此应尽早设置。默认值是 <code class="code">ISO-8859-1</code>，因为这也是GNAT的默认值。
</p>
</dd>
<dt><a id="index-show-ada-source_00_2dcharset"></a><span><code class="code">show ada source-charset</code><a class="copiable-link" href="#index-show-ada-source_00_2dcharset"> ¶</a></span></dt>
<dd><p>显示当前Ada的源字符集。
</p></dd>
</dl>
