<h2 class="chapter" id="Altering-Execution"><span>17 改变执行<a class="copiable-link" href="#Altering-Execution"> &para;</a></span></h2>

<p>一旦你认为在程序中发现了错误，可以通过某些方法确定纠正这个明显的错误是否会在程序的后续运行中产生正确的结果。你可以通过实验，利用<small class="sc">GDB</small>中改变程序执行的功能来找到答案。
</p>
<p>例如，你可以将新值存储到变量或内存位置，向程序发送一个信号，在不同的地址重新启动程序或者甚至从一个函数中提前返回。
</p>
