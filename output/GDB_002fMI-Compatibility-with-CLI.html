<h3 class="section" id="gdb_002fmi-Compatibility-with-CLI"><span>27.3 <small class="sc">GDB/MI</small>与CLI的兼容性<a class="copiable-link" href="#gdb_002fmi-Compatibility-with-CLI"> &para;</a></span></h3>

<a class="index-entry-id" id="index-compatibility_002c-gdb_002fmi-and-CLI"></a>
<a class="index-entry-id" id="index-gdb_002fmi_002c-compatibility-with-CLI"></a>

<p>为方便开发者，CLI命令可以直接输入，但可能会有一些意外行为。例如，询问用户的命令会表现得好像用户回答了是，断点命令列表不会执行，并且一些CLI命令，如<code class="code">if</code>、<code class="code">when</code>和<code class="code">define</code>，会用“<samp class="samp">&gt;</samp>”提示进一步输入，这不是有效的MI输出。
</p>  
<p>此功能可能会在未来某个阶段被移除，建议前端使用<code class="code">-interpreter-exec</code>命令（见 <a class="pxref" href="GDB_002fMI-Miscellaneous-Commands.html#g_t_002dinterpreter_002dexec">-interpreter-exec</a>）。
</p>
