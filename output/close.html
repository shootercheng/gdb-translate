<h4 class="unnumberedsubsubsec" id="close-1"><span>close<a class="copiable-link" href="#close-1"> &para;</a></span></h4>
<a class="index-entry-id" id="索引-close_002c文件_002di_002fo系统调用"></a>

<dl class="table">
<dt>概要：</dt>
<dd><div class="example smallexample">
<pre class="example-preformatted">int close(int fd);
</pre></div>

</dd>
<dt>请求：</dt>
<dd><p>&lsquo;<samp class="samp">Fclose,<var class="var">fd</var></samp>&rsquo;
</p>
</dd>
<dt>返回值：</dt>
<dd><p><code class="code">close</code> 成功时返回零，发生错误时返回 -1。
</p>
</dd>
<dt>错误：</dt>
<dd>
<dl class="table">
<dt><code class="code">EBADF</code></dt>
<dd><p><var class="var">fd</var> 不是有效的打开文件描述符。
</p>
</dd>
<dt><code class="code">EINTR</code></dt>
<dd><p>调用被用户中断。
</p></dd>
</dl>

</dd>
</dl>
