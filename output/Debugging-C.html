<h4 class="subsubsection" id="gdb-and-C"><span>15.4.1.6 <small class="sc">GDB</small>与C<a class="copiable-link" href="#gdb-and-C"> &para;</a></span></h4>

<p><code class="code">set print union</code>和<code class="code">show print union</code>命令适用于<code class="code">union</code>类型。当设置为“<samp class="samp">on</samp>”时，在<code class="code">struct</code>或<code class="code">class</code>内部的任何<code class="code">union</code>也会被打印出来。否则，它会显示为“<samp class="samp">{...}</samp>”。
</p>
<p><code class="code">@</code>运算符有助于调试由指针和内存分配函数构成的动态数组。见<a class="xref" href="Expressions.html">表达式</a>。
</p>
