<h4 class="subsubsection" id="C-and-C_002b_002b-Type-and-Range-Checks"><span>15.4.1.5 C和C<code class="t">++</code>类型及范围检查<a class="copiable-link" href="#C-and-C_002b_002b-Type-and-Range-Checks"> &para;</a></span></h>

<a class="index-entry-id" id="index-C-and-C_002b_002b-checks"></a>

<p>默认情况下，当<small class="sc">GDB</small>解析C或C<code class="t">++</code>表达式时，会使用严格的类型检查。然而，如果关闭类型检查，<small class="sc">GDB</small>将允许某些非标准转换，例如将整数常量提升为指针。
</p>
<p>如果开启范围检查，它会在数学运算上进行。数组索引不会被检查，因为它们经常用于索引一个本身不是数组的指针。
</p>
