<h4 class="unnumberedsubsubsec" id="isatty-1"><span>isatty<a class="copiable-link" href="#isatty-1"> ¶</a></span></h4>
<a class="index-entry-id" id="index-isatty_002c-file_002di_002fo-system-call"></a>

<dl class="table">
<dt>概要：</dt>
<dd><div class="example smallexample">
<pre class="example-preformatted">int isatty(int fd);
</pre></div>

</dd>
<dt>请求：</dt>
<dd><p>&lsquo;<samp class="samp">Fisatty,<var class="var">fd</var></samp>&rsquo;
</p>
</dd>
<dt>返回值：</dt>
<dd><p>如果<var class="var">fd</var>指向GDB控制台，则返回1，否则返回0。
</p>
</dd>
<dt>错误：</dt>
<dd>
<dl class="table">
<dt><code class="code">EINTR</code></dt>
<dd><p>调用被用户中断。
</p></dd>
</dl>

</dd>
</dl>

<p>请注意，<code class="code">isatty</code>调用被视为特殊情况：如果文件描述符连接到GDB控制台，则返回1给目标，否则返回0。通过系统调用实现会需要实现<code class="code">ioctl</code>，并且会比所需的更复杂。
</p>

</div>
