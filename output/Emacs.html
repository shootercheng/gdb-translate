<h2 class="chapter" id="Using-gdb-under-gnu-Emacs"><span>26 在GNU Emacs下使用GDB<a class="copiable-link" href="#Using-gdb-under-gnu-Emacs"> ¶</a></span></h2>

<a class="index-entry-id" id="index-Emacs"></a>
<a class="index-entry-id" id="index-gnu-Emacs"></a>

<p>在GNU Emacs中有一个与GDB的特殊接口，它便于查看你正在调试的程序的源代码。
还有一个类似IDE的GDB接口，有用于断点、栈帧和调试器状态其他方面的专用缓冲区。
</p>
<p>Emacs与GDB交互的详细描述在Emacs手册中给出（见《GNU Emacs手册》中的 <a data-manual="Emacs" href="../Emacs_html/Debuggers.html#Debuggers">调试器</a>）。
</p>
