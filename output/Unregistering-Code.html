<h3 class="section" id="注销代码-1"><span>30.3注销代码<a class="copiable-link" href="#注销代码-1"> &para;</a></span></h3>

<p>如果代码被释放，那么JIT应该使用以下协议：
</p>
<ul class="itemize mark-bullet">
<li>从链表中移除与该代码对应的代码条目。

</li><li>将描述符的<code class="code">relevant_entry</code>字段指向该代码条目。

</li><li>将<code class="code">action_flag</code>设置为<code class="code">JIT_UNREGISTER</code>并调用
<code class="code">__jit_debug_register_code</code>。
</li></ul>

<p>如果JIT在未注销代码的情况下释放或重新编译代码，那么GDB和JIT将泄漏用于关联符号文件的内存。
</p>
