<h4 class="subsection" id="Pascal-1"><span>15.4.7 Pascal<a class="copiable-link" href="#Pascal-1"> ¶</a></span></h>

<a class="index-entry-id" id="index-Pascal在gdb中的支持，限制"></a>
<p>目前，调试使用集合、子范围、文件变量或嵌套函数的Pascal程序不起作用。<small class="sc">GDB</small>不支持使用Pascal语法输入表达式、打印值或类似功能。
</p>
<p>Pascal特定的命令<code class="code">set print pascal_static-members</code>控制是否显示Pascal对象的静态成员。
请参阅 <a class="xref" href="Print-Settings.html">pascal_static-members</a>。
</p>
