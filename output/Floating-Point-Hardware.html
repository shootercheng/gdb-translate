<p>根据配置情况，<small class="sc">GDB</small> 可能能够为你提供有关浮点硬件状态的更多信息。
</p>
<dl class="table">
<dt><a id="索引-info-float"></a><span><code class="code">info float</code><a class="copiable-link" href="#索引-info-float"> &para;</a></span></dt>
<dd><p>显示有关浮点单元的与硬件相关的信息。确切的内容和布局因浮点芯片而异。目前，ARM和x86机器上支持 &lsquo;<samp class="samp">info float</samp>&rsquo;。
</p></dd>
