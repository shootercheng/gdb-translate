<h3 class="section" id="停止和启动多线程程序"><span>5.5停止和启动多线程程序<a class="copiable-link" href="#停止和启动多线程程序"> &para;</a></span></h3>

<a class="index-entry-id" id="索引-已停止的线程"></a>
<a class="index-entry-id" id="索引-线程，已停止的"></a>

<a class="index-entry-id" id="索引-继续线程"></a>
<a class="index-entry-id" id="索引-线程，继续"></a>

<p><small class="sc">GDB</small>支持调试多线程程序（见 <a class="pxref" href="Threads.html">使用多线程调试程序</a>）。
在调试器中有两种控制程序执行的模式。在默认模式下，称为<em class="dfn">全停止模式</em>，当程序中的任何线程停止时（例如，在断点处或单步执行时），程序中的所有其他线程也会被<small class="sc">GDB</small>停止。在某些目标上，<small class="sc">GDB</small>还支持<em class="dfn">非停止模式</em>，在这种模式下，当你在调试器中检查停止的线程时，其他线程可以继续自由运行。
</p>
