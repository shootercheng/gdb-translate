<h4 class="subsection" id="RISC_002dV-1"><span>21.4.10 RISC-V<a class="copiable-link" href="#RISC_002dV-1"> &para;</a></span></h4>
<a class="index-entry-id" id="index-RISC_002dV-support"></a>

<p>当GDB调试RISC-V架构时，它提供以下特殊命令：
</p>
<dl class="table">
<dt><a id="index-set-riscv-numeric_002dregister_002dnames"></a><span><code class="code">set riscv numeric-register-names [on|off]</code><a class="copiable-link" href="#index-set-riscv-numeric_002dregister_002dnames"> &para;</a></span></dt>
<dd><p>此命令控制GDB是使用数字名称还是abi名称显示RISC-V寄存器名称。当为‘<samp class="samp">on</samp>’时，GDB按数字名称显示寄存器（例如‘<samp class="samp">x1</samp>’）。当为‘<samp class="samp">off</samp>’时，GDB按abi名称显示寄存器（例如‘<samp class="samp">ra</samp>’）。默认值为‘<samp class="samp">off</samp>’。
</p>
</dd>
<dt><code class="code">show riscv numeric-register-names</code></dt>
<dd><p>显示GDB是否将按数字名称引用寄存器。
</p>
</dd>
</dl>
