<h4 class="subsection" id="save-tracepoints-filename"><span>13.2.3 <code class="code">save tracepoints <var class="var">filename</var></code><a class="copiable-link" href="#save-tracepoints-filename"> &para;</a></span></h4>
<a class="index-entry-id" id="index-save-tracepoints"></a>
<a class="index-entry-id" id="index-save_002dtracepoints"></a>
<a class="index-entry-id" id="index-save-tracepoints-for-future-sessions"></a>

<p>此命令将所有当前的跟踪点定义及其操作和通过次数保存到一个文件<samp class="file"><var class="var">filename</var></samp>中，该文件适用于以后的调试会话。要读取保存的跟踪点定义，请使用<code class="code">source</code>命令（见 <a class="pxref" href="Command-Files.html">命令文件</a>）。<code class="code">save-tracepoints</code><!-- /@w -->命令是<code class="code">save&nbsp;tracepoints</code><!-- /@w -->的已弃用别名。
</p>
