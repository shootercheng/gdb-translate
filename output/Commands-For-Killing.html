<h4 class="subsection" id="删除和粘贴"><span>33.4.4 删除和粘贴<a class="copiable-link" href="#删除和粘贴"> &para;</a></span></h4>

</p>

如果有负的数值参数，则从光标向前删除到当前行的末尾。
</p>
</dd>
