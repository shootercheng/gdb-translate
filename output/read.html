<h4 class="unnumberedsubsubsec" id="read-1"><span>read<a class="copiable-link" href="#read-1"> ¶</a></span></h4>
<a class="index-entry-id" id="index-read_002c-file_002di_002fo-system-call"></a>

<dl class="table">
<dt>概要：</dt>
<dd><div class="example smallexample">
<pre class="example-preformatted">int read(int fd, void *buf, unsigned int count);
</pre></div>

</dd>
<dt>请求：</dt>
<dd><p>&lsquo;<samp class="samp">Fread,<var class="var">fd</var>,<var class="var">bufptr</var>,<var class="var">count</var></samp>&rsquo;
</p>
</dd>
<dt>返回值：</dt>
<dd><p>成功时，返回读取的字节数。
零表示文件结束。如果count为零，read也返回零。出错时，返回 -1。
</p>
</dd>
<dt>错误：</dt>
<dd>
<dl class="table">
<dt><code class="code">EBADF</code></dt>
<dd><p><var class="var">fd</var>不是有效的文件描述符或未打开用于读取。
</p>
</dd>
<dt><code class="code">EFAULT</code></dt>
<dd><p><var class="var">bufptr</var>是无效的指针值。
</p>
</dd>
<dt><code class="code">EINTR</code></dt>
<dd><p>调用被用户中断。
</p></dd>
</dl>

</dd>
</dl>
