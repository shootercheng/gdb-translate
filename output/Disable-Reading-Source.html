<h3 class="section" id="禁用读取源代码"><span>9.7 禁用读取源代码<a class="copiable-link" href="#禁用读取源代码"> &para;</a></span></h3>
<a class="index-entry-id" id="index-源代码_002c-禁用访问"></a>

<p>在某些情况下，可能希望阻止GDB访问源代码文件。一种可能需要这样做的情况是，如果源代码文件位于慢速网络连接上。
</p>
<p>可以使用以下命令来控制GDB是否应该访问源代码文件：
</p>
<dl class="table">
<dt><a class="index-entry-id" id="index-show-source-open"></a>
<a id="index-set-source-open"></a><span><code class="code">set source open [on|off]</code><a class="copiable-link" href="#index-set-source-open"> &para;</a></span></dt>
<dt><code class="code">show source open</code></dt>
<dd><p>当此选项为“on”（这是默认值）时，GDB将在需要时访问源代码文件，例如在GDB停止时打印源代码行，或响应“list”命令。
</p>
<p>当此选项为“off”时，GDB将不访问源代码文件。
</p></dd>
</dl>
