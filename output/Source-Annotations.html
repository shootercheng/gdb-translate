<h3 class="section" id="显示源"><span>28.7 显示源<a class="copiable-link" href="#显示源"> &para;</a></span></h3>
<a class="index-entry-id" id="index-用于源显示的注释"></a>

<a class="index-entry-id" id="index-源注释"></a>
<p>使用以下注释来代替显示源代码：
</p>

<div class="example smallexample">
<pre class="example-preformatted">^Z^Zsource <var class="var">文件名</var>:<var class="var">行号</var>:<var class="var">字符位置</var>:<var class="var">中间/开头</var>:<var class="var">地址</var>
</pre></div>

<p>其中，<var class="var">文件名</var>是一个绝对文件名，指示要显示的源文件；<var class="var">行号</var>是该文件内的行号（其中1是文件的第一行）；<var class="var">字符位置</var>是文件内的字符位置（其中0是文件的第一个字符）（对于大多数调试格式，这必然指向一行的开头）；如果<var class="var">地址</var>在该行的中间，则<var class="var">中间/开头</var>为&lsquo;<samp class="samp">middle</samp>&rsquo;，如果<var class="var">地址</var>在该行的开头，则为&lsquo;<samp class="samp">beg</samp>&rsquo;；<var class="var">地址</var>是目标程序中与正在显示的源相关联的地址。<var class="var">地址</var>的形式为&lsquo;<samp class="samp">0x</samp>&rsquo;后跟一个或多个小写十六进制数字（请注意，这与语言无关）。
</p>
</div>
